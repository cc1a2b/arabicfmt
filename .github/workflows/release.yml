name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance attestation
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm test
      # Publishes only when an NPM_TOKEN secret is configured. Without it the
      # release still builds and tests (green), but skips publish — so tagging a
      # version that was already published manually doesn't fail the run.
      - name: Publish to npm
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        run: npm publish --provenance
